name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 2 * * *' # Täglich um 2:00 Uhr
  workflow_dispatch:
    inputs:
      days:
        description: 'Lösche Runs, die älter sind als X Tage'
        required: true
        default: '1'
      minimum_runs:
        description: 'Behalte mindestens X Runs pro Workflow'
        required: true
        default: '2'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: 🗑️ Alte Workflow Runs löschen
        uses: actions/github-script@v8
        with:
          script: |
            const days = parseInt('${{ github.event.inputs.days || 1 }}');
            const minRuns = parseInt('${{ github.event.inputs.minimum_runs || 2 }}');
            console.log(`Lösche Runs älter als ${days} Tage, behalte min. ${minRuns} Runs.`);
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            
            // Hole alle Workflows
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
            });
            
            console.log(`Gefunden: ${workflows.data.total_count} Workflows.`);

            for (const workflow of workflows.data.workflows) {
              console.log(`Prüfe Workflow: ${workflow.name} (${workflow.id})`);
              
              // Hole Runs für diesen Workflow (sortiert nach neueste zuerst)
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 100, // Max 100 pro Batch
              });
              
              let keptCount = 0;
              let deletedCount = 0;
              
              for (const run of runs.data.workflow_runs) {
                const ageMs = now - new Date(run.created_at).getTime();
                const ageDays = ageMs / (1000 * 60 * 60 * 24);
                
                // Logik zum Behalten:
                // 1. Ist einer der neuesten N Runs? (minRuns)
                // 2. Ist jünger als X Tage?
                
                if (keptCount < minRuns) {
                  // Behalte Run (Top N)
                  keptCount++;
                  continue;
                }
                
                if (ageDays <= days) {
                   // Behalte Run (Zu neu)
                   continue;
                }
                
                // Lösche Run
                console.log(`Lösche Run ${run.id} (Erstellt: ${run.created_at}, Alter: ${ageDays.toFixed(1)} Tage)`);
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  deletedCount++;
                } catch (e) {
                  console.log(`Fehler beim Löschen von Run ${run.id}: ${e.message}`);
                }
              }
              console.log(`Workflow ${workflow.name}: ${deletedCount} gelöscht.`);
            }
